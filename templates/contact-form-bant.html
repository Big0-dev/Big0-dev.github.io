<!-- Contact Form -->
<div class="contact-form-container">
  <form
    id="contactForm"
    class="contact-form"
    action="https://api.web3forms.com/submit"
    method="POST"
  >
    <input type="hidden" name="access_key" value="4995bef8-9b68-4453-ae2b-6618d35c4278" />
    <input type="hidden" name="subject" value="New lead from Big0.dev" />
    <input type="hidden" name="from_name" value="Big0 Website" />
    <input type="checkbox" name="botcheck" style="display: none" />

    <!-- Row 1: Name + Email -->
    <div class="form-row">
      <div class="form-group">
        <label for="name" class="form-label">Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required autocomplete="name" />
        <div class="form-error" id="name-error"></div>
      </div>
      <div class="form-group">
        <label for="email" class="form-label">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" class="form-input" placeholder="you@company.com" required autocomplete="email" />
        <div class="form-error" id="email-error"></div>
      </div>
    </div>

    <!-- Row 2: Company (full width) -->
    <div class="form-group">
      <label for="company" class="form-label">Company</label>
      <input type="text" id="company" name="company" class="form-input" placeholder="Your company" autocomplete="organization" />
      <div class="form-error" id="company-error"></div>
    </div>

    <!-- What are you building (optional) -->
    <div class="form-group">
      <label for="message" class="form-label">What are you building?</label>
      <textarea id="message" name="message" class="form-input form-textarea" placeholder="Optional" rows="2" style="min-height: auto;"></textarea>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" style="width: 100%; margin-top: 8px;" onclick="if(typeof gtag_report_conversion==='function')gtag_report_conversion();">
      <span class="button-content">Get Free Consultation &rarr;</span>
      <span class="button-loading" style="display: none;">Sending...</span>
    </button>

    <!-- Status -->
    <div class="form-message" id="formMessage" style="display: none;">
      <span id="messageText"></span>
    </div>
  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById("contactForm");
  const submitBtn = document.getElementById("submitBtn");
  const btnContent = submitBtn.querySelector(".button-content");
  const btnLoading = submitBtn.querySelector(".button-loading");
  const formMessage = document.getElementById("formMessage");
  const messageText = document.getElementById("messageText");

  function validateField(field) {
    const value = field.value.trim();
    const errorEl = document.getElementById(`${field.name}-error`);
    if (!errorEl) return true;
    let valid = true, msg = "";
    field.classList.remove("error");
    errorEl.style.display = "none";

    if (field.required && !value) {
      valid = false; msg = "Required.";
    } else if (field.name === "email" && value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
      valid = false; msg = "Enter a valid email.";
    }
    if (!valid) {
      field.classList.add("error");
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }
    return valid;
  }

  form.querySelectorAll(".form-input, .form-textarea").forEach(f => {
    f.addEventListener("blur", () => validateField(f));
    f.addEventListener("input", () => { if (f.classList.contains("error")) validateField(f); });
  });

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    formMessage.style.display = "none";
    let valid = true;
    form.querySelectorAll(".form-input, .form-textarea").forEach(f => { if (!validateField(f)) valid = false; });
    if (!valid) return;

    submitBtn.disabled = true;
    btnContent.style.display = "none";
    btnLoading.style.display = "inline";

    try {
      const fd = new FormData(form);
      const res = await fetch(form.action, { method: "POST", body: fd });
      const data = await res.json();
      if (data.success) {
        formMessage.className = "form-message success";
        messageText.textContent = "Message sent! We'll get back to you within 24 hours.";
        form.reset();
        // Google Ads: track successful form submission as conversion
        if (typeof gtag === 'function') {
          gtag('event', 'conversion', {'send_to': 'AW-18058016051/KdpGCMHCv5UcELPq3aJD'});
        }
      } else {
        formMessage.className = "form-message error";
        messageText.textContent = data.message || "Error sending message. Please try again.";
      }
    } catch (err) {
      formMessage.className = "form-message error";
      messageText.textContent = "Error sending message. Email us at contact@big0.dev";
    } finally {
      submitBtn.disabled = false;
      btnContent.style.display = "inline";
      btnLoading.style.display = "none";
      formMessage.style.display = "block";
    }
  });
});
</script>
